# git-cliff configuration for openwts
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.breaking %} [breaking]{% endif %}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = """
---
This changelog is auto-generated by [git-cliff](https://github.com/orhun/git-cliff)."""
# Postprocessors to clean up commit messages
postprocessors = [
  { pattern = "\(#([0-9]+)\)", replace = " ([#$1](https://github.com/atpaawej/openwts/pull/$1))" },
]

[git]
conventional_commits = true
filter_unconventional = true
# Scopes to exclude from the changelog entirely
skip_commits = [
  { message = "^chore\\(release\\)", skip = true },  # version bumps
  { message = "^chore\\(deps\\)", skip = true },      # dependency updates
]
# Conventional commit groups in display order
commit_preprocessors = [
  { pattern = "^feat\\((.*)\\)", replace = "feat($1)" },
  { pattern = "^fix\\((.*)\\)", replace = "fix($1)" },
  { pattern = "^docs\\((.*)\\)", replace = "docs($1)" },
]
# Map conventional commit types to changelog section headings
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Testing" },
  { message = "^style", group = "Style" },
  { message = "^chore", group = "Chore" },
  { message = ".*", group = "Other", default_scope = "other" },
]
# Filter out these groups (e.g., keep changelog clean)
skip_groups = []
topn = 0
